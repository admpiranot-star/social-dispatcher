<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PiraNOT SDC - Central de Comando</title>
  <style>
    :root {
      --primary: #667eea;
      --secondary: #764ba2;
      --success: #27ae60;
      --danger: #e74c3c;
      --warning: #f39c12;
      --bg: #f4f7f6;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: #333; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    .header { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
    .header h1 { color: var(--primary); font-size: 24px; }
    .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; text-transform: uppercase; }
    .badge-online { background: #d4edda; color: #155724; }
    .badge-offline { background: #f8d7da; color: #721c24; }
    .badge-processing { background: #cce5ff; color: #004085; animation: pulse 2s infinite; }
    .badge-queued { background: #fff3cd; color: #856404; }
    
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .card h2 { font-size: 18px; margin-bottom: 15px; color: #444; border-bottom: 1px solid #eee; padding-bottom: 10px; }
    
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 12px; color: #666; font-size: 13px; border-bottom: 2px solid #f4f7f6; }
    td { padding: 12px; font-size: 14px; border-bottom: 1px solid #f4f7f6; }
    
    .btn { padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; transition: 0.2s; }
    .btn-force { background: var(--warning); color: white; }
    .btn-force:hover { background: #d35400; }
    
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🚀 PiraNOT SDC <small style="font-size: 12px; color: #999;">v1.0 Stable</small></h1>
      <div id="connection-status" class="status-badge badge-offline">Desconectado</div>
    </div>

    <div class="grid">
      <div class="card">
        <h2>📊 Performance (24h)</h2>
        <div id="analytics-summary">Carregando métricas...</div>
      </div>
      <div class="card">
        <h2>🔄 Filas Ativas</h2>
        <div id="queue-stats">Carregando filas...</div>
      </div>
    </div>

    <div class="card">
      <h2>📅 Agenda de Distribuição Operacional (Real-time)</h2>
      <table>
        <thead>
          <tr>
            <th>Post ID</th>
            <th>Título</th>
            <th>Canal</th>
            <th>Agendado</th>
            <th>Status</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="scheduler-body">
          <tr><td colspan="6" style="text-align: center; padding: 40px; color: #999;">Buscando agendamentos...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    let ws;
    const stats = { connected: false };

    function connectWS() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${window.location.host}/ws`);
      
      ws.onopen = () => {
        document.getElementById('connection-status').textContent = 'Online (WS)';
        document.getElementById('connection-status').className = 'status-badge badge-online';
        stats.connected = true;
      };

      ws.onclose = () => {
        document.getElementById('connection-status').textContent = 'Desconectado';
        document.getElementById('connection-status').className = 'status-badge badge-offline';
        stats.connected = false;
        setTimeout(connectWS, 3000);
      };

      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'queue_update' || msg.type === 'initial_state') {
          updateScheduler();
        }
      };
    }

    async function updateScheduler() {
      try {
        const res = await fetch('/api/scheduler/upcoming');
        const json = await res.json();
        if (json.success) {
          const body = document.getElementById('scheduler-body');
          if (json.data.length === 0) {
            body.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 20px;">Nenhum post agendado no radar.</td></tr>';
            return;
          }
          body.innerHTML = json.data.map(item => `
            <tr>
              <td style="font-family: monospace; color: #888;">${item.id.substring(0,8)}</td>
              <td style="font-weight: 500;">${item.title}</td>
              <td>${item.channel} <span style="font-size: 10px; color: #999;">(${item.tier})</span></td>
              <td>${new Date(item.scheduled_at).toLocaleTimeString()}</td>
              <td><span class="status-badge badge-${item.status}">${item.status}</span></td>
              <td><button class="btn btn-force" onclick="forcePublish('${item.id}', '${item.channel}')">POSTAR AGORA</button></td>
            </tr>
          `).join('');
        }
      } catch (err) { console.error(err); }
    }

    async function forcePublish(postId, channel) {
      if (!confirm("Deseja forçar a publicação imediata via bypass de Prioridade 10?")) return;
      try {
        const res = await fetch(`/api/scheduler/force/${postId}?channel=${channel}`, { method: 'POST' });
        if (res.ok) alert("Comando de bypass enviado! O post será processado imediatamente.");
        else alert("Erro ao enviar comando.");
        updateScheduler();
      } catch (err) { alert("Erro de conexão."); }
    }

    // Inicialização
    connectWS();
    updateScheduler();
    setInterval(updateScheduler, 15000);
  </script>
</body>
</html>
